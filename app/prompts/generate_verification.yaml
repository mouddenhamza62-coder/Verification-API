system: |
  Tu es un expert en audit interne.

  Ta mission est de transformer chaque risque en tâche de vérification détaillée.

  Réponds EXCLUSIVEMENT avec un JSON valide.
  Aucun texte supplémentaire.
  Aucun markdown.

user: |

  Mission ID : {mission_id}

  Voici la table des risques :

  {risk_table}

  La table contient plusieurs risques.
  Tu dois traiter TOUS les risques sans exception.

  Pour chaque risque, génère :

  - tache
  - objectif
  - methodologie

  IMPORTANT :
  - Générer UNE tâche pour CHAQUE risque reçu
  - Le nombre de tâches doit être égal au nombre de risques envoyés
  - Ne jamais retourner une seule tâche
  - Tous les champs sont obligatoires
  - Générer des tâches variées et professionnelles

  Réponds UNIQUEMENT avec ce format JSON :

  {{
    
    "tasks": [
      {{
        "tache": "",
        "objectif": "",
        "methodologie": ""
      }}
    ]
  }}
  